#
# Set a rate limit on messages from the container
#


module(load="imuxsock" SysSock.RateLimit.Interval="50" SysSock.RateLimit.Burst="10002") # provides support for local system logging
#module(load="imklog" ParseKernelTimestamp="off" KeepKernelTimestamp="on")   # provides kernel logging support
#module(load="immark")  # provides --MARK-- message capability

# provides UDP syslog reception
#module(load="imudp")
#input(type="imudp" port="514")

# provides TCP syslog reception
#module(load="imtcp")
#input(type="imtcp" port="514")

# provides RELP syslog reception
#module(load="imrelp")
#input(type="imrelp" address="1.1.1.1" port="2514")


###########################
#### GLOBAL DIRECTIVES ####
###########################

# Set remote syslog server
template (name="ForwardFormatInContainer" type="string" string="<%PRI%>%TIMESTAMP:::date-rfc3339% %HOSTNAME% pmon#%syslogtag%%msg:::sp-if-no-1st-sp%%msg%")
*.* action(type="omrelp" target="127.0.0.1" port="2514" action.resumeRetryCount="60" queue.type="LinkedList" queue.size="20000" Template="ForwardFormatInContainer")
